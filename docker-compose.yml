version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - GEMMA_LOCAL_URL=http://agents:8000
      - FIREWORKS_FALLBACK=enabled
    depends_on:
      - agents

  agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "8006:8006"
      - "8007:8007"
      - "8008:8008"